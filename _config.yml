# GitHub Pages Configuration for Ravilla Keerthi Naidu Resume

# Site Settings
title: Ravilla Keerthi Naidu
description: Full Stack Developer | Software Engineer
author: Ravilla Keerthi Naidu
email: your.email@example.com

# Build Settings
theme: null
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# URL configuration
url: "https://lazynoob.github.io"
baseurl: "/Ravilla-Keerthi-Naidu"

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Social Links
social:
  linkedin: https://linkedin.com/in/yourprofile
  github: https://github.com/lazynoob
  twitter: https://twitter.com/yourprofile
  email: your.email@example.com
